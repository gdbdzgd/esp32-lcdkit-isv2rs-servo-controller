name: Build ESP32-C3 Firmware

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.2.6
        target: esp32c3
        path: '.'

    - name: Create firmware artifact
      run: |
        # Create build artifact directory
        mkdir -p firmware
        
        # Copy binary files
        cp build/esp32-lcdkit-isv2rs-servo-controller.bin firmware/
        cp build/bootloader/bootloader.bin firmware/
        cp build/partition_table/partition-table.bin firmware/
        
        # Generate flash command script
        echo "# Flash Instructions" > firmware/FLASH_INSTRUCTIONS.txt
        echo "" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "Method 1: Using esptool.py" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "esptool.py -p PORT -b 460800 --before default_reset --after hard_reset \\" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "  --chip esp32c3 write_flash --flash_mode dio --flash_size 4MB \\" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "  0x0 bootloader.bin \\" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "  0x8000 partition-table.bin \\" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "  0x10000 esp32-lcdkit-isv2rs-servo-controller.bin" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "Method 2: Using idf.py" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "idf.py -p PORT flash" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "" >> firmware/FLASH_INSTRUCTIONS.txt
        echo "Replace PORT with your serial port (e.g., /dev/ttyUSB0 on Linux, COM3 on Windows)" >> firmware/FLASH_INSTRUCTIONS.txt
        
        # Create archive
        cd firmware
        tar -czf ../esp32-lcdkit-isv2rs-servo-controller-firmware.tar.gz *
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp32-lcdkit-isv2rs-servo-controller-firmware
        path: firmware/
        retention-days: 30
    
    - name: Get version info
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          firmware/esp32-lcdkit-isv2rs-servo-controller.bin
          firmware/bootloader.bin
          firmware/partition-table.bin
          firmware/FLASH_INSTRUCTIONS.txt
        body: |
          ## ESP32-C3 LCDKit iSV2-RS Servo Controller Firmware Release ${VERSION}
          
          ### Download Files
          - `esp32-lcdkit-isv2rs-servo-controller.bin`: Main application firmware
          - `bootloader.bin`: ESP32-C3 bootloader
          - `partition-table.bin`: Partition table
          - `FLASH_INSTRUCTIONS.txt`: Flashing instructions
          
          ### Flash Instructions
          See FLASH_INSTRUCTIONS.txt for detailed flashing instructions.
          
          ### Changes
          See commit history for changes in this release.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}